<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DASHBOARD TRANSPARANSI KEUANGAN</title>
  <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRme20nsXGhj8WZdWW8SQc9_le1K6G9ewL13w&s" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
<iframe 
  src="https://script.google.com/macros/s/AKfycbwxZNvRgCjTL0ZL9uBQhGr_mP9uziiEK1u46Mz5T7A_l7VaZEEM-ZqHK8X0pWwoXN-X/exec"
  allow="clipboard-write; share" 
  sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin"
  style="width:100%; height:100vh; border:none;">
</iframe>
  </div>
</body>

</html>
